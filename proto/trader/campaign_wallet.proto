syntax = "proto3";

package campaign_wallet;

import "trader/common.proto";  // Import the common proto

option go_package = "github.com/vexa-group/service-trader-proto/gen/go/campaign_wallet;campaign_wallet";

// CampaignWallet service definition.
service CampaignWalletService {
  rpc Get(GetRequest) returns (CampaignWallet);
  rpc List(ListRequest) returns (ListResponse);
}

// CampaignWallet message.
message CampaignWallet {
  string uid = 1;
  string campaign_uid = 2;
  string exchange_uid = 3;
  string coin_uid = 4;
  int32 precision = 5;
  string start_balance = 6;
  string end_balance = 7;
}

// Request message for Get CampaignWallet.
message GetRequest {
  string uid = 1;
}

// Request message for List CampaignWallet.
message ListRequest {
  common.Pagination pagination = 1;
  FilterRequest filter=2;
}

// Filter message for request List CampaignWallet.
message FilterRequest {
  repeated string uids = 1;
  optional string campaign_uid = 2;
  optional string exchange_uid = 3;
  optional string coin_uid = 4;
}

// Response message containing a list of items.
message ListResponse {
  repeated CampaignWallet items = 1;
  common.Meta meta = 2;  // Use Meta from the imported common.proto
}
